<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historial - WebScan</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container { max-width: 900px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 30px; }
        header h1 {
            font-size: 1.8rem;
            background: linear-gradient(90deg, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: #38bdf8;
            text-decoration: none;
            font-size: 0.9rem;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: #1e293b;
            border-radius: 10px;
            overflow: hidden;
        }
        th, td {
            padding: 14px 16px;
            text-align: left;
            font-size: 0.9rem;
        }
        th {
            background: #16213e;
            color: #94a3b8;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.05em;
        }
        tr:not(:last-child) td { border-bottom: 1px solid #334155; }
        .puntaje-pill {
            display: inline-block;
            padding: 3px 12px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 0.85rem;
        }
        .pill-good { background: #064e3b; color: #4ade80; }
        .pill-mid { background: #422006; color: #facc15; }
        .pill-bad { background: #450a0a; color: #f87171; }
        .acciones a, .acciones button {
            color: #38bdf8;
            text-decoration: none;
            font-size: 0.85rem;
            margin-right: 12px;
            background: none;
            border: none;
            cursor: pointer;
            font-family: inherit;
        }
        .acciones button.eliminar { color: #f87171; }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #64748b;
        }
        .url-cell { max-width: 280px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    </style>
</head>
<body>
    <div class="container">
        <a href="/" class="back-link">← Volver al escáner</a>
        <header>
            <h1>📜 Historial de Escaneos</h1>
        </header>

        {% if escaneos %}
        <table>
            <thead>
                <tr>
                    <th>URL</th>
                    <th>Puntaje</th>
                    <th>Fecha</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                {% for e in escaneos %}
                <tr>
                    <td class="url-cell">{{ e.url }}</td>
                    <td>
                        <span class="puntaje-pill {% if e.puntaje >= 80 %}pill-good{% elif e.puntaje >= 50 %}pill-mid{% else %}pill-bad{% endif %}">
                            {{ e.puntaje }}/100
                        </span>
                    </td>
                    <td>{{ e.fecha }}</td>
                    <td class="acciones">
                        <a href="/escaneo/{{ e.id }}">Ver</a>
                        <a href="/escaneo/{{ e.id }}/pdf">PDF</a>
                        <form method="POST" action="/escaneo/{{ e.id }}/eliminar" style="display:inline;" onsubmit="return confirm('¿Eliminar este escaneo?');">
                            <button type="submit" class="eliminar">Eliminar</button>
                        </form>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        {% else %}
        <div class="empty-state">
            <p>Aún no hay escaneos guardados.</p>
            <p style="margin-top:8px;"><a href="/" style="color:#38bdf8;">Haz tu primer escaneo →</a></p>
        </div>
        {% endif %}
    </div>
</body>
</html>
